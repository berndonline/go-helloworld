name: Build and publish Helm chart

on:
  pull_request:
    paths:
      - 'deploy/charts/helloworld/**'
  push:
    branches:
      - main
    paths:
      - 'deploy/charts/helloworld/**'
  workflow_dispatch:

env:
  CHART_DIR: deploy/charts/helloworld

jobs:
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify chart version bump
        shell: bash
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
              base_ref="origin/${GITHUB_BASE_REF}"
              ;;
            push)
              if [ -z "${EVENT_BEFORE}" ] || [ "${EVENT_BEFORE}" = "0000000000000000000000000000000000000000" ]; then
                echo "No previous commit SHA available; skipping chart version comparison."
                exit 0
              fi
              base_ref="${EVENT_BEFORE}"
              ;;
            workflow_dispatch)
              echo "Workflow dispatched manually; skipping chart version comparison."
              exit 0
              ;;
            *)
              echo "Unsupported event: ${GITHUB_EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          ./hack/check-chart-version.sh "${base_ref}"

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs:
      - version-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect chart changes on push
        id: changes
        if: github.event_name == 'push'
        shell: bash
        env:
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ -z "${EVENT_BEFORE}" ] || [ "${EVENT_BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "chart_changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git diff --quiet "${EVENT_BEFORE}" "${GITHUB_SHA}" -- "${CHART_DIR}"; then
            echo "chart_changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "chart_changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Helm
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.chart_changed == 'true'
        uses: azure/setup-helm@v4

      - name: Lint chart
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.chart_changed == 'true'
        run: helm lint "${CHART_DIR}"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.chart_changed == 'true'
        shell: bash
        env:
          HELM_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          HELM_REGISTRY_USERNAME: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "${HELM_REGISTRY_PASSWORD}" | helm registry login ghcr.io \
            --username "${HELM_REGISTRY_USERNAME}" \
            --password-stdin

      - name: Package chart
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.chart_changed == 'true'
        id: package
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          owner_lc="${REPOSITORY_OWNER,,}"
          mkdir -p dist

          package_file="$(helm package "${CHART_DIR}" --destination dist | awk '{print $NF}')"
          chart_version="$(awk '$1 == "version:" { print $2; exit }' "${CHART_DIR}/Chart.yaml")"

          echo "package_file=${package_file}" >> "${GITHUB_OUTPUT}"
          echo "chart_version=${chart_version}" >> "${GITHUB_OUTPUT}"
          echo "registry=oci://ghcr.io/${owner_lc}/k8s" >> "${GITHUB_OUTPUT}"

      - name: Push chart to GitHub Packages
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.chart_changed == 'true'
        run: helm push "${{ steps.package.outputs.package_file }}" "${{ steps.package.outputs.registry }}"

      - name: Skip publish when chart did not change
        if: github.event_name == 'push' && steps.changes.outputs.chart_changed != 'true'
        run: echo "Chart did not change on this push; skipping publish."

      - name: Report published package
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.chart_changed == 'true'
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc="${REPOSITORY_OWNER,,}"
          echo "Published ghcr.io/${owner_lc}/k8s/go-helloworld-chart:${{ steps.package.outputs.chart_version }}"
